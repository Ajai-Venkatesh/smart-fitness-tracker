            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-background text-on-background font-body selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<!-- SPLASH SCREEN CANVAS -->
<main class="relative min-h-screen w-full flex flex-col justify-between items-center technical-grid pb-12">
<!-- Background Imagery (Decorative HUD Elements) -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20">
<div class="absolute top-1/4 -left-20 w-64 h-64 border border-primary/20 rotate-45"></div>
<div class="absolute bottom-1/4 -right-20 w-80 h-80 border border-secondary/20 -rotate-12"></div>
</div>
<!-- TOP BAR (Simulated Shell Integration) -->
<header class="w-full flex flex-col items-center pt-16 px-6 z-10">
<div class="flex items-baseline space-x-1">
<span class="font-headline font-black text-4xl tracking-tighter text-primary-container">NUTRI</span>
<span class="font-headline font-black text-4xl tracking-tighter text-on-background">MUSCLES</span>
</div>
<p class="font-label text-[10px] tracking-[0.3em] text-on-surface-variant mt-2 uppercase">AI FITNESS &amp; NUTRITION ENGINE</p>
</header>
<!-- CENTER HUD: PROGRESS RING & METRICS -->
<section class="flex flex-col items-center justify-center w-full px-8 z-10">
<!-- Circular HUD -->
<div class="relative flex items-center justify-center w-72 h-72 md:w-[400px] md:h-[400px] mb-12 md:mb-16">
<!-- Outer Glow and Grid -->
<div class="absolute inset-0 rounded-full border border-outline-variant/30 scale-110"></div>
<div class="absolute inset-0 rounded-full border-2 border-primary/10 glow-effect"></div>
<!-- SVG Progress Ring -->
<svg class="w-full h-full" viewbox="0 0 100 100">
<!-- Track -->
<circle cx="50" cy="50" fill="transparent" r="45" stroke="rgba(255,255,255,0.05)" stroke-width="4"></circle>
<!-- Progress (75%) -->
<circle class="progress-ring" cx="50" cy="50" fill="transparent" r="45" stroke="#e1f800" stroke-dasharray="282.7" stroke-dashoffset="70.6" stroke-linecap="square" stroke-width="5"></circle>
</svg>
<!-- Centered Data -->
<div class="absolute flex flex-col items-center text-center">
<span class="font-label text-[12px] text-primary/60 tracking-widest uppercase mb-1">CURRENT FUEL</span>
<h2 class="font-headline font-black text-5xl text-on-background tracking-tighter">2,450</h2>
<span class="font-label text-sm text-on-surface-variant font-bold">kcal</span>
</div>
</div>
<!-- Kinetic Pill Badges -->
<div class="grid grid-cols-3 gap-3 md:gap-6 w-full max-w-md md:max-w-5xl">
<!-- Protein -->
<div class="bg-surface-container-low border-t-2 border-primary-container p-3 flex flex-col items-center">
<span class="font-label text-[9px] text-on-surface-variant tracking-wider uppercase mb-1">PROTEIN</span>
<span class="font-label text-sm font-bold text-on-background">185g</span>
</div>
<!-- Carbs -->
<div class="bg-surface-container-low border-t-2 border-secondary p-3 flex flex-col items-center">
<span class="font-label text-[9px] text-on-surface-variant tracking-wider uppercase mb-1">CARBS</span>
<span class="font-label text-sm font-bold text-on-background">290g</span>
</div>
<!-- Fat -->
<div class="bg-surface-container-low border-t-2 border-tertiary p-3 flex flex-col items-center">
<span class="font-label text-[9px] text-on-surface-variant tracking-wider uppercase mb-1">FAT</span>
<span class="font-label text-sm font-bold text-on-background">75g</span>
</div>
</div>
</section>
<!-- BOTTOM ACTIONS -->
<footer class="w-full px-6 pb-12 z-10">
<div class="max-w-md md:max-w-5xl w-full mx-auto space-y-6 md:space-y-10">
<!-- Hero Image Preview (Background subtle) -->
<div class="relative w-full h-40 md:h-64 overflow-hidden mb-8 md:mb-12 border border-outline-variant/20">

                </button>
</a>
<div class="text-center">
<p class="font-label text-sm text-on-surface-variant">
                        Already have a plan? <a class="text-primary hover:underline underline-offset-4" href="app.html#login">Log in</a>
</p>
</div>
</div>
</footer>
<!-- HUD Corner Ornaments -->
<div class="absolute top-4 left-4 font-label text-[10px] text-outline-variant/50 flex flex-col">
<span>NM-v4.0.2</span>
<span>SECURE_DATA_FEED</span>
